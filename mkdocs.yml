# サイト基本情報
site_name: Vector Search ハンズオン
site_description: IBM Bob × Milvus × watsonx.ai を使ったベクトル検索ハンズオン
site_author: IBM Build Team
site_url: http://localhost:8000/
docs_dir: docs
site_dir: site
exclude_docs: |
  README.md

# テーマ設定
theme:
  name: material
  language: ja
  custom_dir: docs/overrides
  palette:
    scheme: default
    primary: blue-grey
    accent: blue-grey
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
    - content.action.edit
    - content.action.view
  icon:
    repo: fontawesome/brands/github
  font:
    text: Roboto
    code: Roboto Mono

# リポジトリ情報（必要に応じてコメント解除）
# repo_name: vector-search-hands-on
# repo_url: https://github.com/your-org/vector-search-hands-on

# ナビゲーション構造
nav:
  - ホーム: index.md
  - 事前準備: preparation.md
  - Part 1 - 基本的なベクトル検索: part1.md
  - Part 2 - 高度な検索機能: part2.md
  - Part 3 - 実践的な応用: part3.md
  - まとめ: summary.md
  - よくある質問: faq.md

# Markdown拡張機能
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.arithmatex:
      generic: true
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.mark
  - attr_list
  - md_in_html
  - def_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - pymdownx.tasklist:
      custom_checkbox: true
      clickable_checkbox: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.keys
  - toc:
      permalink: true
      permalink_title: Anchor link to this section for reference

# プラグイン設定
plugins:
  - search:
      lang: ja

# 追加設定
extra:
  generator: false

# カスタムCSS（モジュール化済み）
extra_css:
  - stylesheets/extra.css

# カスタムJavaScript（モジュール化済み）
extra_javascript:
  - javascripts/search.js
  - javascripts/navigation.js
  - javascripts/tasks.js
  - javascripts/syntax-highlight.js

# Made with Bob
