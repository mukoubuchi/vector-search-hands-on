site_name: Vector Search ハンズオン
site_description: IBM Bob × Milvus × watsonx.ai を使ったベクトル検索ハンズオン
site_author: IBM Build Team
site_url: http://localhost:8000/
docs_dir: docs
site_dir: site

theme:
  name: material
  language: ja
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: ダークモードに切り替え
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: ライトモードに切り替え
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
    - content.action.edit
    - content.action.view
  icon:
    repo: fontawesome/brands/github
  font:
    text: Roboto
    code: Roboto Mono

# repo_name: vector-search-handson
# repo_url: https://github.com/your-org/vector-search-handson

nav:
  - ホーム: index.md
  - 事前準備: preparation.md
  - 1️⃣ Part 1 - 基本的なベクトル検索: part1.md
  - 2️⃣ Part 2 - 高度な検索機能: part2.md
  - 3️⃣ Part 3 - 実践的な応用: part3.md
  - まとめ: summary.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - pymdownx.arithmatex:
      generic: true
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.mark
  - attr_list
  - md_in_html
  - def_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.keys
  - toc:
      permalink: true
      permalink_title: Anchor link to this section for reference

plugins:
  - search:
      lang: ja

extra:
  generator: false

extra_css:
  - stylesheets/extra.css
