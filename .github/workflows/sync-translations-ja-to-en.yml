name: Sync JA-EN Translations

on:
  push:
    branches:
      - main
    paths:
      - 'docs/ja/**/*.md'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Check for translation sync
        id: check
        run: |
          # 変更されたJAファイルを取得
          CHANGED_JA_FILES=$(git diff --name-only HEAD~1 HEAD | grep '^docs/ja/.*\.md$' || true)
          
          if [ -z "$CHANGED_JA_FILES" ]; then
            echo "No JA files changed"
            echo "needs_sync=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "Changed JA files:"
          echo "$CHANGED_JA_FILES"
          
          # 対応するENファイルが同時に更新されているかチェック
          NEEDS_SYNC=false
          MISSING_EN_FILES=""
          
          for JA_FILE in $CHANGED_JA_FILES; do
            # docs/ja/file.md -> docs/file.md
            EN_FILE="docs/$(basename $JA_FILE)"
            
            # ENファイルが同じコミットで更新されているかチェック
            if ! git diff --name-only HEAD~1 HEAD | grep -q "^$EN_FILE$"; then
              NEEDS_SYNC=true
              MISSING_EN_FILES="$MISSING_EN_FILES\n- $EN_FILE (対応するJA: $JA_FILE)"
            fi
          done
          
          if [ "$NEEDS_SYNC" = true ]; then
            echo "needs_sync=true" >> $GITHUB_OUTPUT
            echo "missing_files<<EOF" >> $GITHUB_OUTPUT
            echo -e "$MISSING_EN_FILES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "needs_sync=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Issue for Translation Sync
        if: steps.check.outputs.needs_sync == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const missingFiles = `${{ steps.check.outputs.missing_files }}`;
            
            const issueBody = `## 🌐 翻訳同期が必要です / Translation Sync Required
            
            日本語版ドキュメントが更新されましたが、対応する英語版が更新されていません。
            
            Japanese documentation has been updated, but the corresponding English version has not been updated.
            
            ### 更新が必要なファイル / Files that need updating:
            ${missingFiles}
            
            ### 対応方法 / How to fix:
            
            1. 日本語版の変更内容を確認
            2. 対応する英語版ファイルを更新
            3. 両方のファイルをコミット
            
            ---
            
            1. Review the changes in the Japanese version
            2. Update the corresponding English version files
            3. Commit both files together
            
            ### 関連コミット / Related Commit:
            ${{ github.sha }}
            `;
            
            // 既存の同期Issueを検索
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'translation-sync'
            });
            
            // 同じ内容のIssueがなければ作成
            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '🌐 JA-EN Translation Sync Required',
                body: issueBody,
                labels: ['translation-sync', 'documentation']
              });
            } else {
              // 既存のIssueにコメント追加
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: `### 新しい同期が必要です / New sync required\n\n${issueBody}`
              });
            }

      - name: Post summary
        if: steps.check.outputs.needs_sync == 'true'
        run: |
          echo "## ⚠️ Translation Sync Required" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Japanese documentation has been updated without corresponding English updates." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "An issue has been created to track this." >> $GITHUB_STEP_SUMMARY

# Made with Bob