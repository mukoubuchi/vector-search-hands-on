name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  attach-participant-zips:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build participant zips
        run: |
          mkdir -p dist
          bash setup/instructor/build-participant-zips.sh dist

      - name: Attach zips to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if ! gh release view "$tag" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            gh release create "$tag" --repo "$GITHUB_REPOSITORY" --title "$tag" --generate-notes
          fi
          gh release upload "$tag" \
            dist/vector-search-builder-en.zip \
            dist/vector-search-builder-ja.zip \
            --repo "$GITHUB_REPOSITORY" --clobber
