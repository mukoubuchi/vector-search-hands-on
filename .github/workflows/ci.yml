name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install actionlint
        run: |
          bash <(curl -sSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) 1.7.12 /usr/local/bin

      - name: Install documentation dependencies
        run: |
          # Keep mkdocs-material / mkdocs-static-i18n versions in sync with
          # setup/instructor/docker-compose.yml (mkdocs service)
          pip install \
            "mkdocs==1.6.1" \
            "mkdocs-material==9.7.6" \
            "mkdocs-material-extensions" \
            "mkdocs-static-i18n==1.3.1" \
            "mkdocs-glightbox" \
            "babel"

      - name: Lint GitHub Actions workflows
        run: actionlint

      - name: Check shell syntax
        run: bash -n lib/*.sh setup/instructor/*.sh

      - name: Lint shell scripts
        run: shellcheck lib/*.sh setup/instructor/*.sh

      - name: Check participant Python syntax
        run: python -m compileall setup/participant

      - name: Lint participant Python
        run: |
          pip install "ruff==0.15.17"
          ruff check setup/participant

      - name: Verify participant zips match repository sources
        run: |
          tmp="$(mktemp -d)"
          bash setup/instructor/build-participant-zips.sh "$tmp"
          for lang in en ja; do
            unzip -q "vector-search-builder-$lang.zip" -d "$tmp/committed-$lang"
            unzip -q "$tmp/vector-search-builder-$lang.zip" -d "$tmp/rebuilt-$lang"
            if ! diff -r "$tmp/committed-$lang" "$tmp/rebuilt-$lang"; then
              echo "::error::vector-search-builder-$lang.zip is out of date." \
                "Run setup/instructor/build-participant-zips.sh and commit the result."
              exit 1
            fi
          done

      - name: Build MkDocs site
        run: mkdocs build --strict
        env:
          SITE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
