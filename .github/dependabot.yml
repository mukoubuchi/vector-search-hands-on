version: 2
updates:
  # Participant Python dependencies (exact pins in requirements.txt)
  - package-ecosystem: pip
    directory: /setup/participant
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    ignore:
      # The pymilvus major version must match the Milvus server (2.6.x);
      # bump it together with the docker-compose Milvus image instead
      - dependency-name: pymilvus
        update-types: ["version-update:semver-major"]

  # GitHub Actions versions in workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly

  # Container images in the instructor docker-compose stack
  - package-ecosystem: docker-compose
    directory: /setup/instructor
    schedule:
      interval: monthly
    ignore:
      # etcd and MinIO versions follow the official Milvus standalone
      # compose file; they are updated together with the Milvus image
      - dependency-name: quay.io/coreos/etcd
      - dependency-name: minio/minio

  # Base image in mkdocs.Dockerfile (the compose service builds a local tag,
  # so the docker-compose ecosystem cannot see this image)
  - package-ecosystem: docker
    directory: /setup/instructor
    schedule:
      interval: monthly
