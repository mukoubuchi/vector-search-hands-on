version: '3.8'

services:
  mkdocs:
    image: squidfunk/mkdocs-material:latest
    container_name: vector-search-docs
    ports:
      - "8001:8000"
    volumes:
      - ../../docs/participant:/docs
    command: serve --dev-addr=0.0.0.0:8000
    restart: unless-stopped
    networks:
      - handson-network

networks:
  handson-network:
    driver: bridge

