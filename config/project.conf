# Vector Search ハンズオン - プロジェクト設定ファイル
# このファイルはプロジェクト全体で使用されるデフォルト設定を定義します

# プロジェクト情報
PROJECT_NAME="vector-search-handson"
PROJECT_VERSION="1.0.0"
PROJECT_DESCRIPTION="IBM Bob IDE × Milvus × Hugging Face Transformers を使ったベクトル検索の実践ハンズオン"

# Milvus設定
MILVUS_DEFAULT_PORT=19530
MILVUS_DEFAULT_USER="root"
MILVUS_DEFAULT_PASSWORD="Milvus"

# MkDocs設定
MKDOCS_PORT=8000
MKDOCS_HOST="0.0.0.0"

# Code Engine設定
CODE_ENGINE_PROJECT_DEFAULT="vector-search-docs"
CODE_ENGINE_APP_NAME_DEFAULT="mkdocs-docs"
CODE_ENGINE_REGION_DEFAULT="jp-tok"
CODE_ENGINE_MIN_SCALE=1
CODE_ENGINE_MAX_SCALE=2
CODE_ENGINE_CPU="0.25"
CODE_ENGINE_MEMORY="0.5G"
CODE_ENGINE_PORT=8000

# Container Registry設定
REGISTRY_REGION_DEFAULT="jp-tok"
REGISTRY_IMAGE_NAME_DEFAULT="mkdocs-docs"
REGISTRY_IMAGE_TAG_DEFAULT="latest"

# タイムアウト設定（秒）
DEPLOY_TIMEOUT=300
HEALTH_CHECK_TIMEOUT=60
HEALTH_CHECK_INTERVAL=5

# ログ設定
LOG_LEVEL="INFO"  # DEBUG, INFO, WARN, ERROR
LOG_TIMESTAMP=true

# Made with Bob